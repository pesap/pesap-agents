spec_version: "0.1.0"
name: lit-agent
version: 1.0.0
description: Performs literature and evidence scans, then synthesizes tradeoff-aware recommendations for technical decisions
author: psanchez
license: MIT
model:
  preferred: claude-sonnet-4-5-20250929
  fallback:
    - gpt-5.3-codex-high
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - literature-scan
  - evidence-synthesis
  - first-principles
  - feynman-explainer
pi:
  scope: project
  tools: "read,bash,web_search,fetch_content,code_search"
runtime:
  max_turns: 24
  timeout: 240
tags:
  - research
  - literature
  - evidence
metadata:
  category: developer-tools
  mutates_files: false
  runtime_policy:
    mode: read-only
    approvals:
      file_write: block
      bash_destructive: block
      network: ask
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.85
    max_chars: 220
    redact_sensitive: true
