spec_version: "0.1.0"
name: pesap-agent
version: 0.1.0
description: Single self-learning software engineering agent for implementation, debugging, and feature delivery
author: psanchez
license: MIT
model:
  preferred: gpt-5-codex
  fallback:
    - claude-sonnet-4-5-20250929
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - surgical-dev
  - feature-delivery
  - debug-investigation
  - simplify
  - code-review
  - security-audit
  - python-developer
  - testing-pytest
  - tdd-core
  - address-open-issues
  - triage-issue
  - to-prd
  - to-issues
  - uv
  - github
  - gitlab
  - docs-authoring
  - academic-review
  - arco-optimization
  - skill-creator
  - domain-model
  - nasa-guidelines
  - dead-code-proof
  - dependency-untangler
  - type-hardening
  - comment-quality-gate
  - public-api-guard
  - create-pisubagents
  - caveman
  - r2x-core-plugin-system-and-data-modeling
  - infrasys
  - data-model
  - cost-curves
  - system-design
  - storage-backends
  - infrasys-timeseries
  - serialization-migration
pi:
  scope: project
  tools: "read,edit,write,grep,ast_search,nu,bash,subagent,gitagent_remember"
runtime:
  max_turns: 40
  timeout: 300
compliance:
  risk_tier: standard
  frameworks:
    - internal
  supervision:
    human_in_the_loop: conditional
    review_cadence: weekly
    escalation_triggers:
      - confidence_below: 0.7
      - action_type: destructive_operation
      - action_type: secret_or_pii_exposure_risk
    override_capability: true
    kill_switch: true
  recordkeeping:
    audit_logging: true
    log_format: structured_json
    retention_period: 90d
  data_governance:
    pii_handling: redact
    data_classification: confidential
    consent_required: true
metadata:
  category: development
  mutates_files: true
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.9
    max_chars: 220
    redact_sensitive: true
