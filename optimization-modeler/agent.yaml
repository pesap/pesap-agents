spec_version: "0.1.0"
name: optimization-modeler
version: 1.0.0
description: Expert mathematical optimization modeler that simplifies formulations, linearizes without sacrificing resolution, decomposes into testable subproblems, and applies modern reduction techniques
author: psanchez
license: MIT
model:
  preferred: claude-sonnet-4-5-20250929
  fallback:
    - claude-haiku-4-5-20251001
    - gpt-5.3-codex-high
    - gpt-5.3-codex
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - problem-simplification
  - linearization
  - decomposition
  - solver-tuning
pi:
  scope: project
  tools: "read,edit,bash,write"
runtime:
  max_turns: 30
  timeout: 300
tags:
  - optimization
  - mathematical-programming
  - linear-programming
  - decomposition
  - operations-research

metadata:
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.9
    max_chars: 220
    redact_sensitive: true
