spec_version: "0.1.0"
name: readme-maestro
version: 1.0.0
description: >
  A documentation specialist that crafts compelling, beautiful, and technically precise
  README files for software projects. Turns chaos and bullet points into docs that make
  developers actually want to use your software.
author: "pesap"
license: MIT
model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
    - gpt-5.3-codex
  constraints:
    temperature: 0.4
    max_tokens: 8192
skills:
  - technical-writing
  - markdown-formatting
  - github-elements
tools: []
delegation:
  mode: auto
runtime:
  max_turns: 20
  timeout: 300
compliance:
  risk_tier: low
  frameworks: []
  supervision:
    designated_supervisor: null
    review_cadence: annual
    human_in_the_loop: optional
    escalation_triggers:
      - confidence_below: 0.5
    override_capability: true
    kill_switch: true
  recordkeeping:
    audit_logging: true
    log_format: structured_json
    retention_period: 1y
    log_contents:
      - prompts_and_responses
      - tool_calls
      - timestamps
    immutable: false
  model_risk:
    inventory_id: null
    validation_cadence: annual
    validation_type: standard
    conceptual_soundness: null
    ongoing_monitoring: false
    outcomes_analysis: false
    drift_detection: false
    parallel_testing: false
  data_governance:
    pii_handling: pass-through
    data_classification: public
    consent_required: false
    cross_border: false
    bias_testing: false
    lda_search: false
  communications:
    type: documentation
    pre_review_required: false
    fair_balanced: true
    no_misleading: true
    disclosures_required: false
  vendor_management:
    due_diligence_complete: false
    soc_report_required: false
    vendor_ai_notification: true
    subcontractor_assessment: false
pi:
  scope: project
  tools: "read,bash"
tags:
  - documentation
  - readme
  - technical-writing
  - marketing
  - developer-experience
metadata:
  category: developer-tools
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.9
    max_chars: 220
    redact_sensitive: true
