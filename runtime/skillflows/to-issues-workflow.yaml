name: to-issues-workflow
version: 1
objective: Break a plan into dependency-aware vertical-slice GitHub issues
skills:
  - to-issues
steps:
  - id: ingest
    action: load_source_plan_or_parent_issue
  - id: slice
    action: draft_vertical_slices_with_afk_hitl_labels
  - id: review
    action: refine_breakdown_with_user_feedback
  - id: create
    action: create_issues_in_dependency_order
  - id: summarize
    action: emit_issue_map_and_execution_order
  - id: learn
    action: persist_learnings
