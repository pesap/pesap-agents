spec_version: "0.1.0"
name: doc-agent
version: 1.0.0
description: Improves CLI and docs communication quality, from command UX and errors to polished READMEs
author: psanchez
license: MIT
model:
  preferred: gpt-5.3-codex
  fallback:
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - cli-design
  - output-formatting
  - error-handling
  - memory-hierarchy
  - technical-writing
  - markdown-formatting
  - github-elements
pi:
  scope: project
  tools: "read,edit,bash,write"
runtime:
  max_turns: 25
  timeout: 240
tags:
  - documentation
  - cli-ux
  - developer-experience
metadata:
  category: developer-tools
  mutates_files: true
  runtime_policy:
    mode: semi-auto
    approvals:
      file_write: allow
      bash_destructive: ask
      network: ask
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.9
    max_chars: 220
    redact_sensitive: true
