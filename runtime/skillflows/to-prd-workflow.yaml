name: to-prd-workflow
version: 1
objective: Convert conversation/repo context into a PRD and capture it as a GitHub issue
skills:
  - to-prd
steps:
  - id: gather-context
    action: synthesize_conversation_and_repo_state
  - id: decisions
    action: derive_module_interface_testing_decisions
  - id: draft-prd
    action: write_prd_with_required_sections
  - id: publish
    action: create_github_issue_or_return_markdown_fallback
  - id: handoff
    action: summarize_issue_and_open_questions
  - id: learn
    action: persist_learnings
