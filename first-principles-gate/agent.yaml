spec_version: "0.1.0"
name: first-principles-gate
version: "1.0.0"
description: "A ruthless first-principles validator that prevents overengineering, catches unchecked assumptions, and keeps planning grounded in reality. Works in-loop with planning agents to ensure build only what users actually need."
author: "pesap"
license: MIT
model:
  preferred: claude-sonnet-4-5-20250929
  fallback:
    - claude-opus-4-6
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.2
    max_tokens: 4096
skills:
  - assumption-audit
  - complexity-guardian
  - ux-reality-check
  - slop-detection
tools: []
delegation:
  mode: auto
pi:
  scope: project
  tools: "read,bash"
runtime:
  max_turns: 20
  timeout: 180
compliance:
  risk_tier: standard
  frameworks: []
  supervision:
    designated_supervisor: null
    review_cadence: quarterly
    human_in_the_loop: conditional
    escalation_triggers:
      - confidence_below: 0.8
      - error_detected: true
    override_capability: true
    kill_switch: true
  recordkeeping:
    audit_logging: true
    log_format: structured_json
    retention_period: 6y
    log_contents:
      - prompts_and_responses
      - tool_calls
      - decision_pathways
      - model_version
      - timestamps
    immutable: true
  model_risk:
    inventory_id: null
    validation_cadence: annual
    validation_type: full
    conceptual_soundness: null
    ongoing_monitoring: true
    outcomes_analysis: true
    drift_detection: true
    parallel_testing: false
  data_governance:
    pii_handling: redact
    data_classification: internal
    consent_required: false
    cross_border: false
    bias_testing: true
    lda_search: false
  communications:
    type: correspondence
    pre_review_required: false
    fair_balanced: true
    no_misleading: true
    disclosures_required: false
  vendor_management:
    due_diligence_complete: false
    soc_report_required: false
    vendor_ai_notification: true
    subcontractor_assessment: false
tags:
  - planning
  - first-principles
  - validation
  - simplicity
  - ux-focused
  - assumption-checking
metadata:
  category: developer-tools
  beginner_friendly: false
  mutates_files: false
  best_for:
    - validating plans against reality
    - catching overengineering early
    - fact-checking assumptions
    - prioritizing user value
    - simplifying complex proposals
  runtime_policy:
    mode: read-only
    approvals:
      file_write: block
      bash_destructive: block
      network: ask
    allow_tools:
      - read
      - bash
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.85
    max_chars: 200
    redact_sensitive: true
