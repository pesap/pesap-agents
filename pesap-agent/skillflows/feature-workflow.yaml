name: feature-workflow
version: 1
objective: Deliver a requested feature with verification and concise handoff
steps:
  - id: clarify
    action: extract_acceptance_criteria
  - id: plan
    action: produce_minimal_plan
  - id: parallel-execution
    action: optionally_delegate_subagents
    parameters:
      tracks:
        - implementation
        - tests
        - docs
  - id: integrate
    action: merge_outputs_consistently
  - id: validate
    action: run_relevant_checks
  - id: handoff
    action: summarize_behavior_risks_next_steps
  - id: learn
    action: persist_learnings
