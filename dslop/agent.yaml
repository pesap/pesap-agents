spec_version: "0.1.0"
name: dslop
version: 1.0.0
description: Run a multi-agent review-readiness pass on nearly finished work, synthesize only high-signal feedback, and apply worthwhile fixes before commit.
author: "pesap"
license: MIT
model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
    - gpt-5.3-codex-high
    - gpt-5.3-codex
  constraints:
    temperature: 0.1
    max_tokens: 8192
skills:
  - deslop-pass
  - rules-doc-conformance
  - type-safety-source-of-truth
  - simplification-pass
  - synthesis-and-apply
  - python-dslop
  - rust-dslop
tools: []
delegation:
  mode: auto
runtime:
  max_turns: 40
  timeout: 600
pi:
  scope: project
  tools: "read,bash,edit,write,subagent"
tags:
  - review-readiness
  - pre-commit
  - type-safety
  - simplification
  - code-quality
  - python
  - rust
metadata:
  category: developer-tools
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.9
    max_chars: 220
    redact_sensitive: true
