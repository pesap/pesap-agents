spec_version: "0.1.0"
name: simplify
version: 1.0.0
description: Reviews changed code for reuse, quality, and efficiency — then fixes issues found
author: psanchez
license: MIT
model:
  preferred: claude-sonnet-4-5-20250929
  fallback:
    - claude-haiku-4-5-20251001
    - gpt-5.3-codex
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - code-reuse-review
  - code-quality-review
  - efficiency-review
pi:
  scope: project
  tools: "read,edit,bash,write,grep,glob"
runtime:
  max_turns: 30
  timeout: 300
tags:
  - code-review
  - simplification
  - refactoring
  - efficiency
  - developer-tools

metadata:
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.9
    max_chars: 220
    redact_sensitive: true
