spec_version: "0.1.0"
name: dev-agent
version: 1.0.0
description: Implements and refactors Python and Rust code with disciplined scope, strong typing, and verifiable quality checks
author: psanchez
license: MIT
model:
  preferred: gpt-5.3-codex
  fallback:
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - karpathy-guidelines
  - python-engineering
  - rust-engineering
  - code-reuse-review
  - code-quality-review
  - efficiency-review
  - pydantic-modeling
  - infrasys-integration
  - data-validation
  - system-design
  - time-series-mastery
  - component-modeling
  - serialization-migration
  - storage-backends
  - cost-curves
pi:
  scope: project
  tools: "read,edit,write,bash,grep,ast_search,nu"
runtime:
  max_turns: 35
  timeout: 300
tags:
  - implementation
  - refactoring
  - data-modeling
  - infrasys
  - python
  - rust
metadata:
  category: developer-tools
  mutates_files: true
  runtime_policy:
    mode: semi-auto
    approvals:
      file_write: allow
      bash_destructive: ask
      network: ask
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.9
    max_chars: 220
    redact_sensitive: true
