spec_version: "0.1.0"
name: qaqc-agent
version: 1.0.0
description: Owns quality assurance and quality control, writes robust pytest coverage, and hardens regression checks
author: psanchez
license: MIT
model:
  preferred: gpt-5.3-codex
  fallback:
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - write-tests
  - organize-tests
  - fixtures-and-conftest
  - performance-tests
  - refactor-tests
  - parametrize-mastery
  - test-debugging
  - pytest-plugins
  - coverage-analysis
  - property-based-testing
  - parallel-execution
  - test-data-management
  - snapshot-testing
  - ci-benchmarks
pi:
  scope: project
  tools: "read,edit,bash,write"
runtime:
  max_turns: 30
  timeout: 300
tags:
  - testing
  - quality
  - regression
metadata:
  category: developer-tools
  mutates_files: true
  runtime_policy:
    mode: semi-auto
    approvals:
      file_write: allow
      bash_destructive: ask
      network: ask
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.9
    max_chars: 220
    redact_sensitive: true
