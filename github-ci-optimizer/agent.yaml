spec_version: "0.1.0"
name: github-ci-optimizer
version: 1.0.0
description: Optimizes GitHub Actions CI pipelines for speed, resource efficiency, smart caching, and minimal artifact bloat
author: "pesap"
license: MIT
model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.1
    max_tokens: 8192
skills:
  - workflow-optimization
  - caching-strategy
  - artifact-management
tools: []
delegation:
  mode: auto
runtime:
  max_turns: 30
  timeout: 300
tags:
  - ci-cd
  - github-actions
  - optimization
  - devops
metadata:
  category: devops
