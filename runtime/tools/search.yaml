name: search
version: 0.1.0
description: Search repository files and symbols for implementation and debugging tasks.
input_schema:
  type: object
  properties:
    query:
      type: string
      description: Search query or regex.
    scope:
      type: string
      enum: [all, code, docs]
      default: all
    max_results:
      type: integer
      minimum: 1
      maximum: 500
      default: 100
  required: [query]
output_schema:
  type: object
  properties:
    matches:
      type: array
      items:
        type: object
        properties:
          path: { type: string }
          line: { type: integer }
          excerpt: { type: string }
    truncated: { type: boolean }
annotations:
  read_only: true
  requires_confirmation: false
  cost: low
