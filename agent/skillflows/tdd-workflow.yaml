name: tdd-workflow
version: 1
objective: Execute behavior-first development via red-green-refactor vertical slices
steps:
  - id: plan
    action: define_behavior_and_public_interface
  - id: red
    action: write_one_failing_behavior_test
  - id: green
    action: implement_minimal_change_to_pass
  - id: refactor
    action: improve_design_while_staying_green
  - id: validate
    action: run_targeted_checks
  - id: summarize
    action: report_cycle_status_and_next_slice
  - id: learn
    action: persist_learnings
