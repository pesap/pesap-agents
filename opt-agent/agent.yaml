spec_version: "0.1.0"
name: opt-agent
version: 1.0.0
description: Optimizes runtime performance, solver/model efficiency, and CI throughput with measurable tradeoffs
author: psanchez
license: MIT
model:
  preferred: gpt-5.3-codex-high
  fallback:
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - algorithmic-optimization
  - memory-profiling
  - problem-simplification
  - linearization
  - decomposition
  - solver-tuning
  - workflow-optimization
  - caching-strategy
  - artifact-management
pi:
  scope: project
  tools: "read,edit,bash,write"
runtime:
  max_turns: 35
  timeout: 300
tags:
  - performance
  - optimization
  - ci
metadata:
  category: developer-tools
  mutates_files: true
  runtime_policy:
    mode: semi-auto
    approvals:
      file_write: allow
      bash_destructive: ask
      network: ask
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.9
    max_chars: 220
    redact_sensitive: true
