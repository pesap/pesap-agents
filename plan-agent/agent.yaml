spec_version: "0.1.0"
name: plan-agent
version: 1.0.0
description: Plans from first principles, audits assumptions, and decomposes work into minimal high-value execution slices
author: psanchez
license: MIT
model:
  preferred: claude-sonnet-4-5-20250929
  fallback:
    - claude-opus-4-6
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.2
    max_tokens: 4096
skills:
  - assumption-audit
  - complexity-guardian
  - ux-reality-check
  - slop-detection
  - first-principles
  - feynman-explainer
pi:
  scope: project
  tools: "read,bash"
runtime:
  max_turns: 24
  timeout: 180
tags:
  - planning
  - first-principles
  - decomposition
metadata:
  category: developer-tools
  mutates_files: false
  runtime_policy:
    mode: read-only
    approvals:
      file_write: block
      bash_destructive: block
      network: ask
    allow_tools:
      - read
      - bash
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.85
    max_chars: 200
    redact_sensitive: true
