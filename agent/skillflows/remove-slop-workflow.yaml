name: remove-slop-workflow
version: 1
objective: Improve maintainability and code quality with behavior-preserving cleanup
steps:
  - id: scope
    action: confirm_scope_and_constraints
  - id: skill-selection
    action: select_language_aware_skills
  - id: parallel-analysis
    action: run_parallel_subagents
    parameters:
      tracks:
        - dry-dedup
        - shared-types
        - unused-code
        - circular-deps
        - weak-types
        - error-handling
        - legacy-pruning
        - comment-quality
      mode: analysis_only
  - id: prioritize
    action: rank_recommendations_by_confidence_and_risk
  - id: implement
    action: apply_high_confidence_changes_sequentially
  - id: validate
    action: run_relevant_checks
  - id: compliance
    action: report_nasa_guideline_status
  - id: handoff
    action: summarize_changes_and_risks
  - id: learn
    action: persist_learnings
