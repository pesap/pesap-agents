spec_version: "0.1.0"
name: review-agent
version: 1.0.0
description: Runs high-signal code and architecture review passes, including security and review-readiness synthesis
author: psanchez
license: MIT
model:
  preferred: gpt-5.3-codex-high
  fallback:
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - code-review
  - security-audit
  - architecture-review
  - code-quality-review
  - nitpicking
  - deslop-pass
  - rules-doc-conformance
  - type-safety-source-of-truth
  - simplification-pass
  - synthesis-and-apply
  - python-dslop
  - rust-dslop
pi:
  scope: project
  tools: "read,edit,bash,write,subagent"
runtime:
  max_turns: 40
  timeout: 360
tags:
  - review
  - security
  - quality
  - readiness
metadata:
  category: developer-tools
  mutates_files: true
  runtime_policy:
    mode: semi-auto
    approvals:
      file_write: ask
      bash_destructive: ask
      network: ask
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.9
    max_chars: 220
    redact_sensitive: true
