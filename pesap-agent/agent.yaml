spec_version: "0.1.0"
name: pesap-agent
version: 0.1.0
description: Single self-learning software engineering agent for implementation, debugging, and feature delivery
author: psanchez
license: MIT
model:
  preferred: gpt-5-codex
  fallback:
    - claude-sonnet-4-5-20250929
  constraints:
    temperature: 0.2
    max_tokens: 8192
skills:
  - debug-investigation
  - feature-delivery
  - skill-authoring
  - github
pi:
  scope: project
  tools: "read,edit,write,grep,ast_search,nu,bash,subagent,gitagent_remember"
runtime:
  max_turns: 40
  timeout: 300
metadata:
  category: development
  mutates_files: true
  feedback_memory_hook:
    enabled: true
    min_confidence: 0.9
    max_chars: 220
    redact_sensitive: true
